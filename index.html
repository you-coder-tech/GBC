<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GBC Modern Player</title>
    <script src="https://unpkg.com/jsgbc@1.0.1/dist/jsgbc.umd.js"></script>
    <style>
        body { background: #121212; color: white; font-family: system-ui; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; touch-action: none; }
        .container { background: #252525; padding: 20px; border-radius: 20px; border: 4px solid #333; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .screen-area { background: #000; width: 320px; height: 288px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 5px solid #111; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        #drop-zone { width: 100%; max-width: 320px; border: 2px dashed #444; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 15px; cursor: pointer; color: #888; }
        #drop-zone.active { border-color: #00ff41; color: #00ff41; background: #1a2e1a; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; margin-top: 10px; }
        .btn { background: #333; border: none; color: white; padding: 15px; border-radius: 50%; font-weight: bold; cursor: pointer; user-select: none; }
        .btn:active { background: #555; transform: scale(0.95); }
        .btn-red { background: #a00; }
    </style>
</head>
<body>

    <div id="drop-zone">اسحب ملف اللعبة (.gbc) هنا للبدء</div>

    <div class="container">
        <div class="screen-area">
            <canvas id="lcd"></canvas>
        </div>

        <div class="controls">
            <div style="display:grid; grid-template-columns: repeat(3, 40px);">
                <div></div><button class="btn" onpointerdown="p('up')" onpointerup="r('up')">▲</button><div></div>
                <button class="btn" onpointerdown="p('left')" onpointerup="r('left')">◀</button><div></div><button class="btn" onpointerdown="p('right')" onpointerup="r('right')">▶</button>
                <div></div><button class="btn" onpointerdown="p('down')" onpointerup="r('down')">▼</button><div></div>
            </div>

            <div style="display:flex; flex-direction:column; gap:10px; justify-content:center;">
                <button class="btn" style="border-radius:10px; padding:5px; font-size:10px;" onpointerdown="p('select')" onpointerup="r('select')">SELECT</button>
                <button class="btn" style="border-radius:10px; padding:5px; font-size:10px;" onpointerdown="p('start')" onpointerup="r('start')">START</button>
            </div>

            <div style="display:flex; gap:10px; align-items:center;">
                <button class="btn btn-red" onpointerdown="p('b')" onpointerup="r('b')">B</button>
                <button class="btn btn-red" onpointerdown="p('a')" onpointerup="r('a')">A</button>
            </div>
        </div>
    </div>

    <script>
        let gb = null;
        const canvas = document.getElementById('lcd');

        // التعامل مع سحب وإفلات الملفات
        const dropZone = document.getElementById('drop-zone');
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('active'); };
        dropZone.ondragleave = () => dropZone.classList.remove('active');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            const file = e.dataTransfer.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                start(data);
            };
            reader.readAsArrayBuffer(file);
        };

        function start(romData) {
            if (gb) gb.stop();
            try {
                // استخدام مكتبة jsgbc الحديثة
                gb = new jsgbc.GameBoy({
                    lcd: { canvas: canvas }
                });
                gb.loadCartridge(romData);
                gb.start();
                dropZone.style.display = 'none';
            } catch (err) {
                alert("خطأ في تشغيل اللعبة: " + err.message);
            }
        }

        const keyMap = {
            up: jsgbc.Key.UP, down: jsgbc.Key.DOWN, left: jsgbc.Key.LEFT, right: jsgbc.Key.RIGHT,
            a: jsgbc.Key.A, b: jsgbc.Key.B, start: jsgbc.Key.START, select: jsgbc.Key.SELECT
        };

        function p(k) { if(gb) gb.input.keyDown(keyMap[k]); }
        function r(k) { if(gb) gb.input.keyUp(keyMap[k]); }
    </script>
</body>
</html>
