<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GBC Ultimate Fix</title>
    
    <script>
        // 1. تعريف الإعدادات والوظائف قبل تحميل المحرك (ضروري جداً لهذا الملف)
        var settings = [true, false, false, true, true, false, false, false, true, true, false, true];
        
        function cout(message, priority) {
            console.log("Log: " + message);
        }

        // كائنات وهمية لمنع خطأ "undefined" في الصوت والذاكرة
        function addEvent(obj, type, fn) {
            if (obj.addEventListener) obj.addEventListener(type, fn, false);
            else if (obj.attachEvent) obj.attachEvent('on' + type, fn);
        }
    </script>

    <script src="GameBoyCore.js"></script>

    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; touch-action: none; }
        #drop-zone { width: 90%; max-width: 350px; border: 2px dashed #7d57bb; background: #222; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 15px; cursor: pointer; color: #7d57bb; }
        .gb-case { background: #7d57bb; padding: 20px; border-radius: 15px 15px 50px 15px; box-shadow: 0 10px 25px #000; width: 260px; }
        .screen-border { background: #333; width: 220px; height: 170px; display: flex; align-items: center; justify-content: center; border-radius: 5px; margin-bottom: 20px; overflow: hidden; margin: 0 auto 20px auto; border: 4px solid #222; }
        canvas { background: #8bac0f; width: 160px; height: 144px; image-rendering: pixelated; }
        .controls { display: flex; justify-content: space-between; width: 100%; }
        .dpad { display: grid; grid-template-columns: repeat(3, 35px); grid-template-rows: repeat(3, 35px); }
        .btn-dir { background: #222; border: none; color: #444; font-size: 18px; cursor: pointer; border-radius: 5px; }
        .actions { display: flex; gap: 8px; transform: rotate(-15deg); margin-top: 15px; }
        .btn-a { width: 40px; height: 40px; background: #a00; border-radius: 50%; border: none; color: white; font-weight: bold; box-shadow: 2px 2px 0 #500; cursor: pointer; }
        .sys-btns { display: flex; gap: 15px; margin-top: 25px; justify-content: center; }
        .pill { width: 35px; height: 8px; background: #555; border-radius: 10px; border: none; transform: rotate(-15deg); cursor: pointer; }
    </style>
</head>
<body>

    <div id="drop-zone">اسحب ملف اللعبة هنا</div>

    <div class="gb-case">
        <div class="screen-border">
            <canvas id="mainCanvas" width="160" height="144"></canvas>
        </div>

        <div class="controls">
            <div class="dpad">
                <div></div><button class="btn-dir" onpointerdown="p(0)" onpointerup="r(0)">▲</button><div></div>
                <button class="btn-dir" onpointerdown="p(2)" onpointerup="r(2)">◀</button><div></div><button class="btn-dir" onpointerdown="p(3)" onpointerup="r(3)">▶</button>
                <div></div><button class="btn-dir" onpointerdown="p(1)" onpointerup="r(1)">▼</button><div></div>
            </div>
            <div class="actions">
                <button class="btn-a" onpointerdown="p(5)" onpointerup="r(5)">B</button>
                <button class="btn-a" onpointerdown="p(4)" onpointerup="r(4)">A</button>
            </div>
        </div>

        <div class="sys-btns">
            <button class="pill" onpointerdown="p(6)" onpointerup="r(6)"></button>
            <button class="pill" onpointerdown="p(7)" onpointerup="r(7)"></button>
        </div>
    </div>

    <script>
        var gb;
        const canvas = document.getElementById('mainCanvas');

        document.getElementById('drop-zone').ondragover = e => e.preventDefault();
        document.getElementById('drop-zone').ondrop = e => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            const reader = new FileReader();

            reader.onload = function(event) {
                try {
                    const romData = event.target.result;
                    
                    // تهيئة المحرك مع تمرير الكانفاس
                    // ملاحظة: GameBoyCore يتوقع ROMImage كمعامل ثاني
                    gb = new GameBoyCore(canvas, romData);
                    
                    // تشغيل المحرك (هذه الخطوة قد تسبب الخطأ إذا لم تكن الإعدادات جاهزة)
                    gb.start();

                    function tick() {
                        if (gb) {
                            gb.run();
                            // استخدام requestAnimationFrame لسلاسة العرض
                            requestAnimationFrame(tick);
                        }
                    }
                    tick();
                    document.getElementById('drop-zone').style.display = 'none';
                } catch (err) {
                    console.error(err);
                    alert("خطأ: " + err.message);
                }
            };
            reader.readAsBinaryString(file);
        };

        // وظائف الأزرار مرتبطة بـ JoyPadEvent داخل GameBoyCore.js
        function p(i) { if(gb && gb.JoyPadEvent) gb.JoyPadEvent(i, true); }
        function r(i) { if(gb && gb.JoyPadEvent) gb.JoyPadEvent(i, false); }

        window.onkeydown = e => {
            const m = {ArrowUp:0, ArrowDown:1, ArrowLeft:2, ArrowRight:3, z:4, x:5, Shift:6, Enter:7};
            if(m[e.key] !== undefined) p(m[e.key]);
        };
        window.onkeyup = e => {
            const m = {ArrowUp:0, ArrowDown:1, ArrowLeft:2, ArrowRight:3, z:4, x:5, Shift:6, Enter:7};
            if(m[e.key] !== undefined) r(m[e.key]);
        };
    </script>
</body>
</html>
