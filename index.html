<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محاكي GBC المطور</title>
    
    <script src="GameBoyCore.js"></script>

    <style>
        :root { --gb-color: #333; --screen-bg: #8bac0f; }
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; touch-action: none; }
        
        .drop-zone { width: 90%; max-width: 400px; border: 2px dashed #555; background: #2a2a2a; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; cursor: pointer; }
        .drop-zone.active { border-color: #00ff00; background: #223322; }

        /* تصميم الجهاز */
        .emulator-body { background: #7d57bb; padding: 30px; border-radius: 20px 20px 60px 20px; box-shadow: 10px 10px 0 #000; width: 320px; }
        .screen-frame { background: #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; position: relative; }
        #canvas-container { width: 160px; height: 144px; background: var(--screen-bg); transform: scale(1.6); transform-origin: top left; margin-bottom: 86px; }
        canvas { image-rendering: pixelated; }

        /* الأزرار */
        .controls { display: flex; justify-content: space-between; align-items: center; }
        .dpad { display: grid; grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(3, 40px); }
        .d-btn { background: #222; border: none; color: white; cursor: pointer; font-size: 20px; }
        
        .actions { display: flex; gap: 15px; transform: rotate(-15deg); }
        .btn-a-b { width: 50px; height: 50px; background: #a00; border-radius: 50%; border: none; color: white; font-weight: bold; box-shadow: 2px 2px 0 #500; cursor: pointer; }
        
        .sys-btns { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        .btn-pill { width: 50px; height: 12px; background: #555; border-radius: 10px; border: none; transform: rotate(-15deg); cursor: pointer; }
        .label { font-size: 9px; color: #ddd; text-align: center; margin-top: 4px; }
    </style>
</head>
<body>

    <div id="drop-zone" class="drop-zone">
        <b>🎮 اسحب ملف اللعبة (.gbc) هنا للبدء</b>
    </div>

    <div class="emulator-body">
        <div class="screen-frame">
            <div id="canvas-container">
                <canvas id="mainCanvas" width="160" height="144"></canvas>
            </div>
        </div>

        <div class="controls">
            <div class="dpad">
                <div></div><button class="d-btn" onpointerdown="p(0)" onpointerup="r(0)">▲</button><div></div>
                <button class="d-btn" onpointerdown="p(2)" onpointerup="r(2)">◀</button><div></div><button class="d-btn" onpointerdown="p(3)" onpointerup="r(3)">▶</button>
                <div></div><button class="d-btn" onpointerdown="p(1)" onpointerup="r(1)">▼</button><div></div>
            </div>

            <div class="actions">
                <button class="btn-a-b" onpointerdown="p(5)" onpointerup="r(5)">B</button>
                <button class="btn-a-b" onpointerdown="p(4)" onpointerup="r(4)">A</button>
            </div>
        </div>

        <div class="sys-btns">
            <div><button class="btn-pill" onpointerdown="p(6)" onpointerup="r(6)"></button><div class="label">SELECT</div></div>
            <div><button class="btn-pill" onpointerdown="p(7)" onpointerup="r(7)"></button><div class="label">START</div></div>
        </div>
    </div>

    <script>
        let gb;
        const canvas = document.getElementById('mainCanvas');

        // التعامل مع سحب الملف
        const zone = document.getElementById('drop-zone');
        zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('active'); };
        zone.ondragleave = () => zone.classList.remove('active');
        zone.ondrop = (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                startEmulator(ev.target.result);
                zone.style.display = 'none';
            };
            reader.readAsBinaryString(file);
        };

        function startEmulator(romData) {
            try {
                // استدعاء الكلاس الموجود داخل GameBoyCore.js
                gb = new GameBoyCore(canvas, romData);
                gb.start();
                
                // تشغيل حلقة التحديث (Loop) لضمان استمرارية اللعبة
                setInterval(function() {
                    gb.run();
                }, 16); // 60 إطار في الثانية تقريباً
                
            } catch (e) {
                alert("تأكد من وجود ملف GameBoyCore.js في نفس المجلد!");
                console.error(e);
            }
        }

        // تحكم المفاتيح (Mapping) حسب مكتبة GameBoyCore
        // 0:Up, 1:Down, 2:Left, 3:Right, 4:A, 5:B, 6:Select, 7:Start
        function p(i) { if(gb) gb.JoyPadEvent(i, true); }
        function r(i) { if(gb) gb.JoyPadEvent(i, false); }

        // دعم لوحة مفاتيح الكمبيوتر
        window.onkeydown = (e) => {
            const keys = {ArrowUp:0, ArrowDown:1, ArrowLeft:2, ArrowRight:3, z:4, x:5, Shift:6, Enter:7};
            if(keys[e.key] !== undefined) p(keys[e.key]);
        };
        window.onkeyup = (e) => {
            const keys = {ArrowUp:0, ArrowDown:1, ArrowLeft:2, ArrowRight:3, z:4, x:5, Shift:6, Enter:7};
            if(keys[e.key] !== undefined) r(keys[e.key]);
        };
    </script>
</body>
</html>
