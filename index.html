<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GBC Mini Emulator</title>
    <script src="https://unpkg.com/gb-emulator@1.1.0/dist/gb-emulator.js"></script>
    <style>
        :root { --main-color: #3d3d3d; --accent: #ff0055; }
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; overflow: hidden; touch-action: none; }
        
        .upload-section { display: flex; gap: 10px; width: 100%; max-width: 350px; margin-bottom: 10px; }
        .drop-zone { flex: 1; border: 2px dashed #555; background: #222; padding: 10px; border-radius: 8px; text-align: center; font-size: 11px; cursor: pointer; }
        .drop-zone.ready { border-color: #00ff00; background: #1b2e1b; }

        #container { position: relative; width: 320px; height: 288px; background: #000; border: 10px solid var(--main-color); border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; width: 100%; max-width: 380px; margin-top: 20px; }
        .dpad { display: grid; grid-template-columns: repeat(3, 45px); grid-template-rows: repeat(3, 45px); }
        .btn { background: #333; border: none; color: white; border-radius: 50%; font-weight: bold; cursor: pointer; user-select: none; box-shadow: 0 4px #000; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #444; }
        
        .btn-action { width: 55px; height: 55px; background: #a00; font-size: 18px; }
        .btn-sys { height: 25px; border-radius: 10px; font-size: 9px; background: #444; margin-top: 15px; }
        
        #status-msg { margin-top: 10px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <h3 style="margin: 5px 0;">GBC Emulator</h3>

    <div class="upload-section">
        <div id="bios-zone" class="drop-zone"><b>BIOS</b><br>(اختياري)</div>
        <div id="rom-zone" class="drop-zone"><b>ROM</b><br>اسحب اللعبة هنا</div>
    </div>

    <div id="container">
        <canvas id="screen"></canvas>
    </div>

    <div id="status-msg">بانتظار ملف اللعبة...</div>

    <div class="controls">
        <div class="dpad">
            <div></div><button class="btn" onpointerdown="p('up')" onpointerup="r('up')">▲</button><div></div>
            <button class="btn" onpointerdown="p('left')" onpointerup="r('left')">◀</button><div></div><button class="btn" onpointerdown="p('right')" onpointerup="r('right')">▶</button>
            <div></div><button class="btn" onpointerdown="p('down')" onpointerup="r('down')">▼</button><div></div>
        </div>

        <div style="display:flex; flex-direction:column; align-items:center;">
            <button class="btn btn-sys" onpointerdown="p('select')" onpointerup="r('select')">SELECT</button>
            <button class="btn btn-sys" onpointerdown="p('start')" onpointerup="r('start')">START</button>
        </div>

        <div style="display:flex; gap:10px; align-items:center;">
            <button class="btn btn-action" onpointerdown="p('b')" onpointerup="r('b')">B</button>
            <button class="btn btn-action" style="background:#c0392b" onpointerdown="p('a')" onpointerup="r('a')">A</button>
        </div>
    </div>

    <script>
        let emulator = null;
        let biosData = null;

        function setupZone(id, isBios) {
            const el = document.getElementById(id);
            el.ondragover = (e) => { e.preventDefault(); el.style.background = "#333"; };
            el.ondragleave = () => { el.style.background = "#222"; };
            el.ondrop = (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const data = new Uint8Array(ev.target.result);
                    if (isBios) {
                        biosData = data;
                        el.innerHTML = "✅ BIOS";
                        el.classList.add('ready');
                    } else {
                        document.getElementById('status-msg').innerText = "جاري التشغيل: " + file.name;
                        el.classList.add('ready');
                        initGame(data);
                    }
                };
                reader.readAsArrayBuffer(file);
            };
        }

        setupZone('bios-zone', true);
        setupZone('rom-zone', false);

        function initGame(rom) {
            try {
                // تنظيف الشاشة قبل البدء
                const canvas = document.getElementById('screen');
                // بناء المحاكي (هذا يعتمد على كود المكتبة المرفقة)
                if (window.GameBoyEmulator) {
                    emulator = new GameBoyEmulator(canvas);
                    emulator.start(rom, biosData);
                } else {
                    // حل بديل في حال تعذر تحميل المكتبة
                    alert("خطأ: تعذر تحميل محرك المحاكي من الرابط. تأكد من الإنترنت.");
                }
            } catch (err) {
                console.error(err);
                document.getElementById('status-msg').innerText = "خطأ في ملف اللعبة!";
            }
        }

        // تحكم المفاتيح
        const keyMap = {
            up: 'up', down: 'down', left: 'left', right: 'right',
            a: 'a', b: 'b', start: 'start', select: 'select'
        };

        function p(k) { if(emulator) emulator.buttonPressed(keyMap[k]); }
        function r(k) { if(emulator) emulator.buttonReleased(keyMap[k]); }
    </script>
</body>
</html>
