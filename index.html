<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GBC Master Emulator</title>
    
    <script src="binjgb.js"></script>
    
    <style>
        :root { --bg: #121212; --accent: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        
        .upload-area { display: flex; gap: 10px; width: 90%; max-width: 400px; margin: 15px 0; }
        .drop-zone { flex: 1; border: 2px dashed #444; background: #1e1e1e; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 12px; }
        .drop-zone.active { border-color: var(--accent); background: #222; }

        #screen-wrapper { 
            width: 320px; height: 288px; background: #000; 
            border: 10px solid #333; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; width: 90%; max-width: 400px; margin-top: 20px; }
        .dpad { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
        .btn { background: #333; border: none; color: white; border-radius: 50%; cursor: pointer; font-weight: bold; box-shadow: 0 4px #000; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #444; }
        
        .btn-action { width: 60px; height: 60px; background: #d32f2f; font-size: 20px; }
        .btn-sys { height: 30px; border-radius: 15px; font-size: 10px; background: #555; }
        
        #status { font-size: 11px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 style="margin-top:20px; color:var(--accent)">GBC OFFLINE</h2>

    <div class="upload-area">
        <div id="bios-drop" class="drop-zone"><b>BIOS</b><br>اسحب هنا</div>
        <div id="rom-drop" class="drop-zone"><b>ROM</b><br>اسحب اللعبة</div>
    </div>

    <div id="screen-wrapper">
        <canvas id="emulator-canvas"></canvas>
    </div>

    <div id="status">جاهز للاستخدام...</div>

    <div class="controls">
        <div class="dpad">
            <div></div><button class="btn" onpointerdown="sendKey('up',1)" onpointerup="sendKey('up',0)">▲</button><div></div>
            <button class="btn" onpointerdown="sendKey('left',1)" onpointerup="sendKey('left',0)">◀</button><div></div><button class="btn" onpointerdown="sendKey('right',1)" onpointerup="sendKey('right',0)">▶</button>
            <div></div><button class="btn" onpointerdown="sendKey('down',1)" onpointerup="sendKey('down',0)">▼</button><div></div>
        </div>

        <div style="display:flex; flex-direction:column; justify-content:center; gap:10px;">
            <button class="btn btn-sys" onpointerdown="sendKey('select',1)" onpointerup="sendKey('select',0)">SELECT</button>
            <button class="btn btn-sys" onpointerdown="sendKey('start',1)" onpointerup="sendKey('start',0)">START</button>
        </div>

        <div style="display:flex; gap:15px; align-items:center;">
            <button class="btn btn-action" onpointerdown="sendKey('b',1)" onpointerup="sendKey('b',0)">B</button>
            <button class="btn btn-action" style="background:#b71c1c" onpointerdown="sendKey('a',1)" onpointerup="sendKey('a',0)">A</button>
        </div>
    </div>

    <script>
        let emulator = null;
        let biosData = null;

        function initDropZone(id, isBios) {
            const zone = document.getElementById(id);
            zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('active'); };
            zone.ondragleave = () => zone.classList.remove('active');
            zone.ondrop = (e) => {
                e.preventDefault();
                zone.classList.remove('active');
                const file = e.dataTransfer.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const data = new Uint8Array(ev.target.result);
                    if (isBios) {
                        biosData = data;
                        zone.innerHTML = "✅ BIOS محمل";
                    } else {
                        zone.innerHTML = "🎮 " + file.name;
                        startEmulator(data);
                    }
                };
                reader.readAsArrayBuffer(file);
            };
        }

        initDropZone('bios-drop', true);
        initDropZone('rom-drop', false);

        async function startEmulator(romData) {
            const canvas = document.getElementById('emulator-canvas');
            // التأكد من تهيئة المكتبة
            try {
                const module = await Binjgb();
                emulator = new module.Emulator(romData, biosData);
                
                function loop() {
                    if (!emulator) return;
                    emulator.runFrame();
                    const frameData = emulator.getFrameBuffer();
                    // كود رسم الفريم على الكانفاس (يعتمد على واجهة المكتبة)
                    renderToCanvas(frameData); 
                    requestAnimationFrame(loop);
                }
                loop();
                document.getElementById('status').innerText = "جاري التشغيل...";
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "خطأ في التشغيل!";
            }
        }

        // خريطة المفاتيح
        function sendKey(key, isPressed) {
            if (!emulator) return;
            const keys = {
                up: 0x40, down: 0x80, left: 0x20, right: 0x10,
                a: 0x01, b: 0x02, select: 0x04, start: 0x08
            };
            if (isPressed) emulator.setKeyDown(keys[key]);
            else emulator.setKeyUp(keys[key]);
        }
    </script>
</body>
</html>
