<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GBC Emulator - النسخة المحلية</title>
    
    <script src="jsgbc.umd.js"></script>
    
    <style>
        :root { --primary: #4a90e2; --bg: #121212; --panel: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 15px; overflow: hidden; }
        .upload-container { display: flex; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 15px; }
        .drop-zone { flex: 1; border: 2px dashed #444; background: var(--panel); padding: 10px; border-radius: 8px; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .drop-zone.active { border-color: var(--primary); background: #252525; }
        #screen-container { width: 320px; height: 288px; background: #000; border: 8px solid #333; border-radius: 12px; position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; margin-top: 25px; }
        .dpad { display: grid; grid-template-columns: repeat(3, 45px); grid-template-rows: repeat(3, 45px); }
        .btn { background: #333; border: none; color: white; border-radius: 50%; font-weight: bold; cursor: pointer; user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }
        .btn:active { background: #555; transform: scale(0.9); }
        .btn-action { width: 55px; height: 55px; background: #d0021b; font-size: 18px; box-shadow: 0 4px #800; }
        .btn-action:active { box-shadow: 0 2px #800; transform: translateY(2px); }
        .btn-sys { height: 25px; border-radius: 5px; font-size: 10px; background: #444; }
        .status { margin-top: 5px; color: #888; display: block; }
    </style>
</head>
<body>

    <h3 style="margin: 0 0 15px 0;">GBC Offline Emulator</h3>

    <div class="upload-container">
        <div id="bios-zone" class="drop-zone">
            <b>BIOS</b>
            <span class="status" id="bios-st">اختياري</span>
        </div>
        <div id="rom-zone" class="drop-zone">
            <b>ROM</b>
            <span class="status" id="rom-st">اسحب اللعبة هنا</span>
        </div>
    </div>

    <div id="screen-container">
        <canvas id="screen"></canvas>
    </div>

    <div class="controls">
        <div class="dpad">
            <div></div><button class="btn" onpointerdown="input('up',1)" onpointerup="input('up',0)">↑</button><div></div>
            <button class="btn" onpointerdown="input('left',1)" onpointerup="input('left',0)">←</button><div></div><button class="btn" onpointerdown="input('right',1)" onpointerup="input('right',0)">→</button>
            <div></div><button class="btn" onpointerdown="input('down',1)" onpointerup="input('down',0)">↓</button><div></div>
        </div>

        <div style="display:flex; flex-direction:column; justify-content:center; gap:8px;">
            <button class="btn btn-sys" onpointerdown="input('select',1)" onpointerup="input('select',0)">SELECT</button>
            <button class="btn btn-sys" onpointerdown="input('start',1)" onpointerup="input('start',0)">START</button>
        </div>

        <div style="display:flex; gap:10px; align-items:center;">
            <button class="btn btn-action" onpointerdown="input('b',1)" onpointerup="input('b',0)">B</button>
            <button class="btn btn-action" onpointerdown="input('a',1)" onpointerup="input('a',0)">A</button>
        </div>
    </div>

    <script>
        let gb = null;
        let bios = null;

        // وظيفة السحب والإفلات
        function setup(id, callback) {
            const zone = document.getElementById(id);
            zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('active'); };
            zone.ondragleave = () => zone.classList.remove('active');
            zone.ondrop = (e) => {
                e.preventDefault();
                zone.classList.remove('active');
                const file = e.dataTransfer.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => callback(new Uint8Array(ev.target.result), file.name);
                reader.readAsArrayBuffer(file);
            };
        }

        setup('bios-zone', (data, name) => {
            bios = data;
            document.getElementById('bios-st').innerText = "✅ جاهز";
        });

        setup('rom-zone', (data, name) => {
            document.getElementById('rom-st').innerText = "🎮 " + name;
            start(data);
        });

        function start(rom) {
            if (typeof jsgbc === 'undefined') {
                alert("خطأ: لم يتم العثور على ملف jsgbc.umd.js بجانب ملف HTML!");
                return;
            }
            if (gb) gb.stop();
            gb = new jsgbc.GameBoy({
                lcd: { canvas: document.getElementById('screen') },
                bios: bios
            });
            gb.loadCartridge(rom);
            gb.start();
        }

        const keys = {
            up: jsgbc.Key.UP, down: jsgbc.Key.DOWN, left: jsgbc.Key.LEFT, right: jsgbc.Key.RIGHT,
            a: jsgbc.Key.A, b: jsgbc.Key.B, start: jsgbc.Key.START, select: jsgbc.Key.SELECT
        };

        function input(k, down) {
            if (gb) {
                if (down) gb.input.keyDown(keys[k]);
                else gb.input.keyUp(keys[k]);
            }
        }
    </script>
</body>
</html>
