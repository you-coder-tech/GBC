<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محاكي GameBoy المطور</title>
    <script src="https://unpkg.com/binjgb/dist/binjgb.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; touch-action: none; }
        .device { background: #5d4291; padding: 25px; border-radius: 15px 15px 50px 15px; box-shadow: 0 10px 30px #000; width: 280px; }
        .screen-frame { background: #333; width: 240px; height: 180px; display: flex; align-items: center; justify-content: center; border-radius: 5px; margin: 0 auto 20px auto; overflow: hidden; border: 4px solid #222; }
        canvas { background: #8bac0f; width: 160px; height: 144px; image-rendering: pixelated; transform: scale(1.3); }
        .controls { display: flex; justify-content: space-between; width: 100%; }
        .dpad { display: grid; grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(3, 40px); }
        .btn-d { background: #222; border: none; color: #444; font-size: 20px; border-radius: 5px; cursor: pointer; }
        .actions { display: flex; gap: 10px; transform: rotate(-15deg); margin-top: 20px; }
        .btn-a { width: 45px; height: 45px; background: #a00; border-radius: 50%; border: none; color: white; font-weight: bold; box-shadow: 2px 2px 0 #500; cursor: pointer; }
        #file-input { margin-bottom: 20px; color: #7d57bb; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <input type="file" id="file-input" accept=".gb,.gbc">
    <div style="margin-bottom: 15px; font-size: 13px; color: #888;">اختر ملف اللعبة لتشغيل المحرك الحديث</div>

    <div class="device">
        <div class="screen-frame">
            <canvas id="screen" width="160" height="144"></canvas>
        </div>

        <div class="controls">
            <div class="dpad">
                <div></div><button class="btn-d" id="up">▲</button><div></div>
                <button class="btn-d" id="left">◀</button><div></div><button class="btn-d" id="right">▶</button>
                <div></div><button class="btn-d" id="down">▼</button><div></div>
            </div>
            <div class="actions">
                <button class="btn-a" id="b">B</button>
                <button class="btn-a" id="a">A</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('screen');
        const fileInput = document.getElementById('file-input');
        let joypad = 0;

        // مفاتيح التحكم: 
        const BITS = { a: 1, b: 2, select: 4, start: 8, right: 16, left: 32, up: 64, down: 128 };

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            const buffer = await file.arrayBuffer();
            const rom = new Uint8Array(buffer);
            
            // تهيئة Binjgb الحديث
            const binjgb = await Binjgb();
            const emulator = new binjgb.Emulator(rom);

            function loop() {
                emulator.set_joypad(joypad);
                emulator.run_until_vblank();
                const pixels = emulator.get_pixels();
                const imageData = new ImageData(new Uint8ClampedArray(pixels.buffer), 160, 144);
                canvas.getContext('2d').putImageData(imageData, 0, 0);
                requestAnimationFrame(loop);
            }
            loop();
        };

        const bind = (id, bit) => {
            const el = document.getElementById(id);
            el.onpointerdown = () => joypad |= bit;
            el.onpointerup = () => joypad &= ~bit;
            el.onpointerleave = () => joypad &= ~bit;
        };
        Object.keys(BITS).forEach(k => { if(document.getElementById(k)) bind(k, BITS[k]); });
    </script>
</body>
</html>
